<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .text-title { font-family: system-ui, sans-serif; font-size: 18px; font-weight: bold; fill: #ffffff; }
      .text-body { font-family: system-ui, sans-serif; font-size: 14px; fill: #334155; }
      .line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 4; fill: none; }
      .arrow { fill: #94a3b8; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <!-- Next.js App -->
  <rect x="50" y="50" width="220" height="300" class="box" />
  <rect x="50" y="50" width="220" height="40" fill="#000000" rx="8" />
  <rect x="50" y="70" width="220" height="20" fill="#000000" />
  <text x="160" y="76" text-anchor="middle" class="text-title">Next.js App (4100)</text>
  <text x="70" y="120" class="text-body">• API Routes</text>
  <text x="70" y="150" class="text-body">• Kanban UI</text>
  <text x="70" y="180" class="text-body">• Session Viewer</text>
  <text x="70" y="210" class="text-body">• SSE Endpoints</text>
  <text x="70" y="240" class="text-body">• WebSocket/Socket.io</text>

  <!-- Worker -->
  <rect x="350" y="50" width="400" height="130" class="box" />
  <rect x="350" y="50" width="400" height="40" fill="#2563eb" rx="8" />
  <rect x="350" y="70" width="400" height="20" fill="#2563eb" />
  <text x="550" y="76" text-anchor="middle" class="text-title">Worker (agendo-worker)</text>
  <text x="370" y="120" class="text-body">• Dequeues execute-capability job</text>
  <text x="370" y="150" class="text-body">• Spawns AI CLI subprocesses</text>

  <!-- MCP Server -->
  <rect x="350" y="220" width="400" height="130" class="box" />
  <rect x="350" y="220" width="400" height="40" fill="#16a34a" rx="8" />
  <rect x="350" y="240" width="400" height="20" fill="#16a34a" />
  <text x="550" y="246" text-anchor="middle" class="text-title">MCP Server (mcp-server.js)</text>
  <text x="370" y="290" class="text-body">• Injected into agent sessions (stdio)</text>
  <text x="370" y="320" class="text-body">• Exposes task management tools</text>

  <!-- Connections -->
  <path d="M 270 115 L 340 115" class="line" marker-end="url(#arrowhead)" />
  <text x="305" y="105" text-anchor="middle" class="text-body" style="font-size: 12px">pg-boss queue</text>

  <path d="M 340 145 L 270 145" class="line" marker-end="url(#arrowhead)" />
  <text x="305" y="160" text-anchor="middle" class="text-body" style="font-size: 12px">PG NOTIFY</text>

  <!-- Connection Worker to MCP -->
  <path d="M 550 180 L 550 210" class="line" marker-end="url(#arrowhead)" />
  <text x="570" y="200" class="text-body" style="font-size: 12px">stdio transport</text>
  
  <!-- MCP to App -->
  <path d="M 350 285 L 270 285" class="line" marker-end="url(#arrowhead)" />
  <text x="310" y="275" text-anchor="middle" class="text-body" style="font-size: 12px">HTTP API</text>
</svg>
