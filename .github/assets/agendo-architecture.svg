  <text x="849" y="133" text-anchor="middle"
    font-family="'SF Mono','Consolas','Liberation Mono',monospace"
    font-size="10" font-weight="600" fill="#8b949e" letter-spacing="0.06em">AI CLI</text>
  <text x="849" y="144" text-anchor="middle"
    font-family="'SF Mono','Consolas','Liberation Mono',monospace"
    font-size="8" fill="#484f58">Claude · Codex</text>
  <!-- spawn label on connecting line -->
  <text x="748" y="128" text-anchor="middle"
    font-family="'SF Mono','Consolas','Liberation Mono',monospace"
    font-size="8" fill="#e3b341">spawn →</text>
</g>

<!-- ══════════════════════════════════════
     BOX 1 — Next.js App  (blue border)
     ══════════════════════════════════════ -->
<g class="b1">
  <rect x="222" y="16" width="480" height="52" rx="8"
    fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="462" y="38" text-anchor="middle"
    font-family="'SF Mono','Consolas','Liberation Mono',monospace"
    font-size="13" font-weight="600" fill="#e6edf3" letter-spacing="0.08em">NEXT.JS APP  :4100</text>
  <text x="462" y="56" text-anchor="middle"
    font-family="'SF Mono','Consolas','Liberation Mono',monospace"
